name: Release

run-name: Release
on:
  push:
    tags:
    - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  release_project:
    name: Release project
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive

    - name: Setup mise
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

    # タグから 'v' を取り除いたものを変数に保存
    - name: Extract version
      id: extract-version
      run: |
        $version = "$env:GITHUB_REF_NAME".TrimStart('v')
        echo "version=$version" >> $env:GITHUB_OUTPUT

    - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
    - name: Build project
      run: |
        mise run build
      env:
        PYTHONUTF8: 1

    - name: Create release notes
      run: |
        dotnet .\tools\ChangelogExtract.cs -- .\CHANGELOG.md .\EXTRACTED.md --semver "$env:VERSION"
        Move-Item -Path "release\*.au2pkg.zip" -Destination .\
        gh release create "v$env:VERSION" --notes-file EXTRACTED.md "*.au2pkg.zip"
      env:
        VERSION: ${{ steps.extract-version.outputs.version }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
